name: pet_pal
description: "Aplicación de cuidado de mascotas PetPal"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  uuid: ^4.3.3
  image_picker: ^1.1.2
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3
  pdf: ^3.10.6
  share_plus: ^7.0.2
  flutter_local_notifications: ^19.4.0
  timezone: ^0.10.0
  flutter_timezone: ^4.1.1
  rxdart: ^0.28.0
  file_picker: ^10.2.4
  path: ^1.9.0
  table_calendar: ^3.1.3
  image_cropper: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png